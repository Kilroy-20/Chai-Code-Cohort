<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"></stop>
      <stop offset="100%" stop-color="#06B6D4"></stop>
    </linearGradient>
  </defs>

  <!-- Calendar Icon -->
  <g transform="translate(10,10)">

    <!-- Calendar body -->
    <rect x="0" y="20" width="80" height="70" rx="14" fill="url(#grad)"></rect>

    <!-- Calendar rings -->
    <rect x="18" y="0" width="10" height="24" rx="4" fill="#7C3AED"></rect>
    <rect x="52" y="0" width="10" height="24" rx="4" fill="#7C3AED"></rect>

    <!-- Checkmark -->
    <path d="M20 60 L35 75 L62 45" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>

  </g>

  <!-- Text -->
  <text x="110" y="75" font-family="Inter, Poppins, Arial, sans-serif" font-size="48" font-weight="600" fill="#111827">
        Book
  </text>

  <text x="230" y="75" font-family="Inter, Poppins, Arial, sans-serif" font-size="48" font-weight="600" fill="url(#grad)">
        Vite
  </text>

</svg>